<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Voz Médica Pro - Panel de Control</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8f9fa; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .mic-area { text-align: center; margin-bottom: 25px; }
        .btn-mic { background: #e74c3c; color: white; border: none; width: 70px; height: 70px; border-radius: 50%; font-size: 24px; cursor: pointer; transition: 0.3s; }
        .btn-mic.active { background: #2ecc71; box-shadow: 0 0 15px #2ecc71; }
        .status { color: #e74c3c; font-weight: bold; margin-top: 10px; font-size: 16px; }

        /* Estilos de tarjetas según image_2e8e11.png */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: white; padding: 15px; border-radius: 8px; border: 1px solid #dee2e6; }
        .card label { font-weight: bold; color: #34495e; display: block; margin-bottom: 8px; font-size: 13px; }
        .content { min-height: 40px; color: #555; font-size: 15px; }
        .full { grid-column: span 2; }

        .btn-action { margin-top: 25px; display: flex; flex-direction: column; gap: 10px; }
        .btn-main { padding: 16px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; text-align: center; font-size: 16px; text-decoration: none; display: block; }
        .btn-blue { background: #3498db; color: white; width: 100%; }
        .btn-green { background: #25d366; color: white; display: none; } /* Oculto hasta guardar */
    </style>
</head>
<body>

<div class="container">
    <div class="mic-area">
        <button id="start-mic" class="btn-mic"><i class="fas fa-microphone"></i></button>
        <div id="status-label" class="status">MICRÓFONO DESACTIVADO</div>
    </div>

    <div class="grid">
        <div class="card"><label>PACIENTE:</label><div id="p-paciente" class="content">---</div></div>
        <div class="card"><label>CÉDULA:</label><div id="p-cedula" class="content">---</div></div>
        <div class="card full"><label>INFORME MÉDICO:</label><div id="p-informe" class="content">---</div></div>
        <div class="card full"><label>RÉCIPE:</label><div id="p-recipe" class="content">---</div></div>
        <div class="card full"><label>INDICACIONES:</label><div id="p-indicaciones" class="content">---</div></div>
        <div class="card full"><label>ORDEN DE EXÁMENES:</label><div id="p-examenes" class="content">---</div></div>
    </div>

    <div class="btn-action">
        <button onclick="finalizarConsulta()" class="btn-main btn-blue">
            <i class="fas fa-save"></i> GUARDAR Y GENERAR PDF
        </button>
        <a id="wa-btn" href="#" class="btn-main btn-green" target="_blank">
            <i class="fab fa-whatsapp"></i> ENVIAR PDF / TEXTO POR WHATSAPP
        </a>
    </div>
</div>

<script>
    const btn = document.getElementById('start-mic');
    const label = document.getElementById('status-label');
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'es-ES';
    recognition.continuous = true;

    btn.onclick = () => {
        if(btn.classList.contains('active')) { recognition.stop(); } 
        else { recognition.start(); }
    };

    recognition.onstart = () => { btn.classList.add('active'); label.innerText = "ESCUCHANDO..."; label.style.color = "#2ecc71"; };
    recognition.onend = () => { btn.classList.remove('active'); label.innerText = "MICRÓFONO DESACTIVADO"; label.style.color = "#e74c3c"; };

    recognition.onresult = (event) => {
        const text = event.results[event.results.length - 1][0].transcript.toLowerCase();
        if(text.includes("paciente")) document.getElementById('p-paciente').innerText = text.split("paciente")[1].trim();
        if(text.includes("cédula")) document.getElementById('p-cedula').innerText = text.split("cédula")[1].trim();
        if(text.includes("informe")) document.getElementById('p-informe').innerText = text.split("informe")[1].trim();
        if(text.includes("récipe")) document.getElementById('p-recipe').innerText = text.split("récipe")[1].trim();
        if(text.includes("indicaciones")) document.getElementById('p-indicaciones').innerText = text.split("indicaciones")[1].trim();
        if(text.includes("exámenes")) document.getElementById('p-examenes').innerText = text.split("exámenes")[1].trim();
    };

    async function finalizarConsulta() {
        const d = {
            paciente: document.getElementById('p-paciente').innerText,
            cedula: document.getElementById('p-cedula').innerText,
            informe: document.getElementById('p-informe').innerText,
            recipe: document.getElementById('p-recipe').innerText,
            indicaciones: document.getElementById('p-indicaciones').innerText,
            examenes: document.getElementById('p-examenes').innerText
        };

        const res = await fetch('/guardar', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(d)
        });

        if(res.ok) {
            alert("Consulta guardada en Supabase.");
            crearPDF(d);
            const wa = document.getElementById('wa-btn');
            wa.href = `https://wa.me/?text=*REPORTE MÉDICO*%0A*Paciente:* ${d.paciente}%0A*Informe:* ${d.informe}`;
            wa.style.display = "block";
        } else {
            alert("Error de sesión o servidor.");
        }
    }

    function crearPDF(d) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(20);
        doc.text("REPORTE MÉDICO", 105, 20, {align:"center"});
        doc.setFontSize(12);
        doc.text(`Paciente: ${d.paciente}`, 20, 40);
        doc.text(`Cédula: ${d.cedula}`, 20, 50);
        doc.text(`Informe: ${d.informe}`, 20, 70, {maxWidth: 170});
        doc.text(`Récipe: ${d.recipe}`, 20, 110);
        doc.save(`${d.paciente}_Consulta.pdf`);
    }
</script>
</body>
</html>
