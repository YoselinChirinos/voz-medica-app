<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>VozMédica Pro - Sistema Seguro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #0277bd; --secondary: #2e7d32; --danger: #c62828; --bg: #f0f4f8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .header-app { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px; }
        .mic-box { text-align: center; margin-bottom: 20px; border: 2px dashed var(--primary); padding: 15px; border-radius: 10px; background: #fff; }
        .btn-mic { background: var(--danger); color: white; border: none; width: 60px; height: 60px; border-radius: 50%; font-size: 24px; cursor: pointer; transition: 0.3s; }
        .btn-mic.recording { background: var(--secondary); animation: pulse 1.5s infinite; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full { grid-column: span 2; }
        label { font-weight: bold; color: var(--primary); display: block; margin-top: 10px; font-size: 14px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 15px; background: #fdfdfd; }
        textarea { height: 110px; line-height: 1.6; }
        .action-bar { display: flex; gap: 10px; margin-top: 25px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; }
        .btn-logout { background: #555; padding: 8px 15px; font-size: 12px; }
        .btn-clear { background: #9e9e9e; }
        .btn-save { background: var(--primary); }
        .btn-wa { background: var(--secondary); display: none; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(46, 125, 50, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(46, 125, 50, 0); } 100% { box-shadow: 0 0 0 0 rgba(46, 125, 50, 0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header-app">
        <h2 style="margin:0; color: var(--primary);">🩺 VozMédica Pro</h2>
        <a href="/logout" class="btn btn-logout">CERRAR SESIÓN</a>
    </div>

    <div class="mic-box">
        <button id="btn-mic" class="btn-mic" onclick="toggleMic()">🎤</button>
        <p id="status">Presione para dictar: "Nombre...", "Cédula...", "Informe..."</p>
        <div id="interino" style="color: #999; font-style: italic; font-size: 13px; min-height: 20px;"></div>
    </div>

    <div class="grid">
        <div><label>Nombre del Paciente:</label><input type="text" id="pac_nom" autocomplete="off"></div>
        <div><label>Cédula:</label><input type="text" id="pac_ced" autocomplete="off"></div>
        <div class="full"><label>Informe Clínico:</label><textarea id="informe" placeholder="Puntuación automática: diga 'punto' o 'coma'"></textarea></div>
        <div class="full"><label>Récipe:</label><textarea id="recipe"></textarea></div>
        <div class="full"><label>Indicaciones de Uso:</label><textarea id="indicaciones"></textarea></div>
        <div class="full"><label>Exámenes Solicitados:</label><textarea id="examenes"></textarea></div>
    </div>

    <div class="action-bar">
        <button class="btn btn-clear" onclick="limpiarTodo()">🔄 CORREGIR / LIMPIAR</button>
        <button id="btn-save" class="btn btn-save" onclick="enviarProceso()">🚀 GUARDAR Y GENERAR PDF</button>
        <button id="btn-wa" class="btn btn-wa" onclick="compartirWA()">📲 ENVIAR POR WHATSAPP</button>
    </div>
</div>

<script>
    let recognition;
    let isRecording = false;

    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'es-ES';

        recognition.onresult = (event) => {
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    clasificarTexto(event.results[i][0].transcript.toLowerCase());
                } else {
                    document.getElementById('interino').innerText = event.results[i][0].transcript;
                }
            }
        };
    }

    function toggleMic() {
        if (!isRecording) { 
            recognition.start(); 
            isRecording = true; 
            document.getElementById('btn-mic').classList.add('recording');
            document.getElementById('status').innerText = "Escuchando... diga la palabra clave antes de cada dato.";
        } else { 
            recognition.stop(); 
            isRecording = false; 
            document.getElementById('btn-mic').classList.remove('recording');
            document.getElementById('status').innerText = "Micrófono apagado.";
        }
    }

    // LÓGICA DE CLASIFICACIÓN RIGUROSA
    function clasificarTexto(t) {
        // Formatear puntuación
        let limpio = t.replace(/ coma /g, ", ").replace(/ punto /g, ". ").replace(/ nueva línea /g, "\n").trim();
        
        const mapa = [
            { cmd: "nombre", id: "pac_nom" },
            { cmd: "cédula", id: "pac_ced" },
            { cmd: "cedula", id: "pac_ced" },
            { cmd: "informe", id: "informe" },
            { cmd: "récipe", id: "recipe" },
            { cmd: "recipe", id: "recipe" },
            { cmd: "indicaciones", id: "indicaciones" },
            { cmd: "exámenes", id: "examenes" },
            { cmd: "examenes", id: "examenes" }
        ];

        mapa.forEach(item => {
            if (limpio.includes(item.cmd)) {
                let fragmento = limpio.split(item.cmd)[1].trim();
                
                // Evitar que el texto de un comando se pase al siguiente
                mapa.forEach(otro => {
                    if (fragmento.includes(otro.cmd)) {
                        fragmento = fragmento.split(otro.cmd)[0].trim();
                    }
                });

                if (fragmento) {
                    const campo = document.getElementById(item.id);
                    // Si el campo ya tiene algo, no sobrescribimos, añadimos (con lógica de separación)
                    let prefijo = (campo.value && item.id.includes('pac')) ? "" : (campo.value ? " " : "");
                    campo.value = prefijo + fragmento.charAt(0).toUpperCase() + fragmento.slice(1);
                }
            }
        });
    }

    function limpiarTodo() {
        if(confirm("¿Estás segura de borrar los datos para corregir?")) {
            document.querySelectorAll('input, textarea').forEach(i => i.value = "");
            document.getElementById('btn-wa').style.display = "none";
        }
    }

    async function enviarProceso() {
        const d = {
            nombre: document.getElementById('pac_nom').value,
            cedula: document.getElementById('pac_ced').value,
            informe: document.getElementById('informe').value,
            recipe: document.getElementById('recipe').value,
            indicaciones: document.getElementById('indicaciones').value,
            examenes: document.getElementById('examenes').value
        };

        if(!d.nombre) return alert("Error: El nombre es obligatorio.");

        try {
            const res = await fetch('/guardar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(d)
            });

            if (res.ok) {
                generarPDFPro(d);
                document.getElementById('btn-wa').style.display = "block";
                alert("✅ Datos guardados y PDF generado correctamente.");
            } else {
                alert("❌ Error de acceso a base de datos. Verifique su conexión.");
            }
        } catch(e) { alert("Error crítico de red."); }
    }

    function generarPDFPro(d) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const fecha = new Date().toLocaleDateString();

        doc.setFont("helvetica", "bold");
        doc.text("CONSULTA MÉDICA DIGITAL", 105, 20, { align: 'center' });
        doc.setFontSize(10);
        doc.text(`Fecha de Emisión: ${fecha}`, 150, 30);

        doc.setFontSize(12);
        doc.text(`PACIENTE: ${d.nombre}`, 20, 45);
        doc.text(`CÉDULA: ${d.cedula}`, 20, 52);

        let y = 65;
        const bloques = [
            { t: "INFORME CLÍNICO:", c: d.informe },
            { t: "RÉCIPE MÉDICO:", c: d.recipe },
            { t: "INDICACIONES DE USO:", c: d.indicaciones },
            { t: "EXÁMENES SOLICITADOS:", c: d.examenes }
        ];

        bloques.forEach(b => {
            if(b.c) {
                doc.setFont("helvetica", "bold");
                doc.text(b.t, 20, y);
                y += 7;
                doc.setFont("helvetica", "normal");
                const lines = doc.splitTextToSize(b.c, 170);
                doc.text(lines, 20, y);
                y += (lines.length * 7) + 8;
            }
        });

        // Área de Sello y Firma
        doc.setDrawColor(180);
        doc.line(130, 265, 185, 265);
        doc.setFontSize(9);
        doc.text("Firma y Sello Húmedo", 157, 270, { align: 'center' });

        doc.save(`VozMedica_${d.nombre.replace(/ /g,'_')}.pdf`);
    }

    function compartirWA() {
        const nom = document.getElementById('pac_nom').value;
        const txt = `*VOZMÉDICA PRO*\n\nHola ${nom}, adjunto envío su documentación médica en PDF generada en la consulta de hoy.`;
        window.open(`https://wa.me/?text=${encodeURIComponent(txt)}`, '_blank');
    }
</script>
</body>
</html>
