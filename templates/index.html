<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VozMédica Pro - Consola de Dictado</title>
    <!-- Librería para generación de PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root { 
            --primary: #0277bd; 
            --secondary: #2e7d32; 
            --warning: #f39c12; 
            --danger: #c62828; 
            --bg: #f0f4f8; 
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding: 20px; 
        }

        .container { 
            max-width: 900px; 
            margin: auto; 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
        }

        h1 { color: var(--primary); text-align: center; margin-bottom: 30px; }
        
        /* Consola de Voz */
        .mic-box { 
            text-align: center; 
            padding: 20px; 
            border: 2px dashed var(--primary); 
            border-radius: 15px; 
            margin-bottom: 20px; 
            background: #fafafa; 
        }

        .btn-mic { 
            background: var(--danger); 
            color: white; 
            border: none; 
            border-radius: 50%; 
            width: 70px; 
            height: 70px; 
            font-size: 30px; 
            cursor: pointer; 
            transition: 0.3s; 
        }

        .btn-mic.recording { 
            background: var(--secondary); 
            animation: pulse 1.5s infinite; 
        }

        #status { font-weight: bold; margin-top: 10px; color: #555; }
        #interino { font-style: italic; color: #888; min-height: 24px; margin-top: 5px; }
        
        /* Formulario dinámico */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full { grid-column: span 2; }
        
        label { 
            font-weight: bold; 
            display: block; 
            margin-bottom: 5px; 
            color: var(--primary); 
            font-size: 14px; 
            text-transform: uppercase;
        }

        input, textarea { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 15px; 
            background: #fff;
        }

        textarea { height: 100px; resize: none; }

        /* Botones Inferiores */
        .action-bar { display: flex; gap: 15px; margin-top: 30px; }
        
        .btn-action { 
            flex: 1; 
            border: none; 
            padding: 18px; 
            border-radius: 10px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.2s; 
            color: white; 
        }

        .btn-save { background: var(--secondary); }
        .btn-save:hover { background: #1b5e20; }
        .btn-save:disabled { background: #ccc; cursor: not-allowed; }

        @keyframes pulse { 
            0% { box-shadow: 0 0 0 0 rgba(46, 125, 50, 0.4); } 
            70% { box-shadow: 0 0 0 15px rgba(46, 125, 50, 0); } 
            100% { box-shadow: 0 0 0 0 rgba(46, 125, 50, 0); } 
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🩺 VozMédica Pro</h1>
    
    <div class="mic-box">
        <button id="btn-mic" class="btn-mic" onclick="toggleMic()">🎤</button>
        <div id="status">Haz clic para dictar</div>
        <div id="interino"></div>
    </div>

    <div class="grid">
        <div>
            <label>Nombre del Paciente:</label>
            <input type="text" id="pac_nom" placeholder="Diga 'Nombre...'">
        </div>
        <div>
            <label>Cédula:</label>
            <input type="text" id="pac_ced" placeholder="Diga 'Cédula...'">
        </div>
        <div>
            <label>WhatsApp:</label>
            <input type="text" id="pac_tel" placeholder="Diga 'WhatsApp...'">
        </div>
        <div>
            <label>Próxima Cita:</label>
            <input type="text" id="regresar" placeholder="Diga 'Cita...'">
        </div>
        
        <div class="full">
            <label>Informe Clínico:</label>
            <textarea id="informe" placeholder="Diga 'Informe...'"></textarea>
        </div>
        <div class="full">
            <label>Récipe (Medicamentos):</label>
            <textarea id="recipe" placeholder="Diga 'Récipe...'"></textarea>
        </div>
        <div class="full">
            <label>Indicaciones de Uso:</label>
            <textarea id="indicaciones" placeholder="Diga 'Indicaciones...'"></textarea>
        </div>
        <div class="full">
            <label>Exámenes Solicitados:</label>
            <textarea id="examenes" placeholder="Diga 'Exámenes...'"></textarea>
        </div>
    </div>

    <div class="action-bar">
        <button id="btn-main" class="btn-action btn-save" onclick="enviarProcesar()">
            🚀 GUARDAR Y GENERAR DOCUMENTOS
        </button>
    </div>
</div>

<script>
    let recognition;
    let isRecording = false;

    // Configuración del Reconocimiento de Voz
    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'es-ES';

        recognition.onresult = (event) => {
            let textoTemporal = "";
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                let transcript = event.results[i][0].transcript.toLowerCase();
                if (event.results[i].isFinal) {
                    distribuirTexto(transcript);
                } else {
                    textoTemporal += transcript;
                }
            }
            document.getElementById('interino').innerText = textoTemporal;
        };

        recognition.onerror = (event) => {
            console.error("Error de reconocimiento:", event.error);
            stopMic();
        };
    }

    function toggleMic() {
        if (!isRecording) startMic();
        else stopMic();
    }

    function startMic() {
        recognition.start();
        isRecording = true;
        document.getElementById('btn-mic').classList.add('recording');
        document.getElementById('status').innerText = "Escuchando... use palabras clave (Nombre, Cédula, Informe...)";
    }

    function stopMic() {
        recognition.stop();
        isRecording = false;
        document.getElementById('btn-mic').classList.remove('recording');
        document.getElementById('status').innerText = "Micrófono apagado";
        document.getElementById('interino').innerText = "";
    }

    // LÓGICA DE DISTRIBUCIÓN EXPERTA (Evita el error de image_941d28.png)
    function distribuirTexto(t) {
        const mapaComandos = [
            { key: "nombre", id: "pac_nom" },
            { key: "cédula", id: "pac_ced" },
            { key: "cedula", id: "pac_ced" },
            { key: "whatsapp", id: "pac_tel" },
            { key: "informe", id: "informe" },
            { key: "récipe", id: "recipe" },
            { key: "recipe", id: "recipe" },
            { key: "indicaciones", id: "indicaciones" },
            { key: "exámenes", id: "examenes" },
            { key: "examenes", id: "examenes" },
            { key: "cita", id: "regresar" }
        ];

        mapaComandos.forEach(cmd => {
            if (t.includes(cmd.key)) {
                // Extrae solo lo que está DESPUÉS de la palabra clave
                let fragmento = t.split(cmd.key)[1].trim();
                if (fragmento) {
                    let campo = document.getElementById(cmd.id);
                    // Formateo: Primera letra en mayúscula
                    campo.value = fragmento.charAt(0).toUpperCase() + fragmento.slice(1);
                }
            }
        });
    }

    // FLUJO DE GUARDADO Y SALIDA
    async function enviarProcesar() {
        const btn = document.getElementById('btn-main');
        const datos = {
            nombre: document.getElementById('pac_nom').value,
            cedula: document.getElementById('pac_ced').value,
            telefono: document.getElementById('pac_tel').value,
            informe: document.getElementById('informe').value,
            recipe: document.getElementById('recipe').value,
            indicaciones: document.getElementById('indicaciones').value,
            examenes: document.getElementById('examenes').value,
            cita: document.getElementById('regresar').value
        };

        if (!datos.nombre) return alert("Error: Debe ingresar al menos el nombre del paciente.");

        btn.disabled = true;
        btn.innerText = "⌛ PROCESANDO...";

        try {
            // 1. Guardar en Base de Datos
            const response = await fetch('/guardar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datos)
            });

            if (response.ok) {
                // 2. Generar PDF Local
                generarPDF(datos);
                
                // 3. Abrir WhatsApp
                enviarWhatsApp(datos);

                alert("✅ PROCESO COMPLETADO:\n1. Datos guardados en la nube.\n2. PDF generado.\n3. Chat de WhatsApp abierto.");
                
                // Limpiar formulario para el siguiente paciente
                location.reload();
            } else {
                const err = await response.json();
                alert("❌ Error en Servidor: " + err.message);
            }
        } catch (error) {
            alert("❌ Error Crítico: No hay conexión con el servidor.");
        } finally {
            btn.disabled = false;
            btn.innerText = "🚀 GUARDAR Y GENERAR DOCUMENTOS";
        }
    }

    function generarPDF(d) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        doc.setFont("helvetica", "bold");
        doc.text("INFORME MÉDICO Y RÉCIPE", 105, 20, { align: 'center' });
        
        doc.setFontSize(12);
        doc.text(`PACIENTE: ${d.nombre}`, 20, 40);
        doc.text(`CÉDULA: ${d.cedula}`, 20, 50);
        doc.text(`FECHA: ${new Date().toLocaleDateString()}`, 20, 60);
        
        doc.text("INDICACIONES:", 20, 80);
        doc.setFont("helvetica", "normal");
        const lines = doc.splitTextToSize(d.indicaciones || "N/A", 170);
        doc.text(lines, 20, 90);
        
        doc.save(`Consulta_${d.nombre.replace(/ /g, "_")}.pdf`);
    }

    function enviarWhatsApp(d) {
        if (!d.telefono) return;
        const msg = `*VOZMÉDICA PRO*\n\nHola *${d.nombre}*,\nAdjunto sus indicaciones:\n\n${d.indicaciones}\n\n*Próxima Cita:* ${d.cita}`;
        const cleanPhone = d.telefono.replace(/\D/g, '');
        window.open(`https://wa.me/${cleanPhone}?text=${encodeURIComponent(msg)}`, '_blank');
    }
</script>
</body>
</html>
