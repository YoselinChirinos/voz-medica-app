<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voz Médica Pro - Sistema de Dictado</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #3498db; --secondary: #2ecc71; --danger: #e74c3c; --dark: #2c3e50; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 2px solid #eee; margin-bottom: 25px; padding-bottom: 10px; }
        .btn-mic { background: var(--danger); color: white; border: none; width: 70px; height: 70px; border-radius: 50%; font-size: 25px; cursor: pointer; transition: 0.3s; display: block; margin: 10px auto; }
        .btn-mic.grabando { animation: pulse 1.5s infinite; background: #c0392b; }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); } 70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(231, 76, 60, 0); } 100% { transform: scale(1); } }
        .grid-campos { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .campo-box { background: #fafafa; padding: 15px; border-radius: 8px; border: 1px solid #ddd; }
        .campo-box label { font-weight: bold; color: var(--dark); display: block; margin-bottom: 5px; font-size: 13px; }
        .resultado-texto { min-height: 30px; color: #555; word-wrap: break-word; }
        .full-width { grid-column: span 2; }
        .acciones { margin-top: 30px; display: flex; flex-direction: column; gap: 10px; }
        .btn-main { padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; text-decoration: none; }
        .btn-pdf { background: var(--primary); color: white; }
        .btn-wa { background: var(--secondary); color: white; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 style="color: var(--dark); margin:0;">VOZ MÉDICA PRO</h1>
        <p style="color: #7f8c8d;">Control de Consulta por Dictado</p>
    </div>

    <button id="btn-dictar" class="btn-mic"><i class="fas fa-microphone"></i></button>
    <p id="status" style="text-align:center; font-weight:bold; color:var(--danger);">Micrófono Desactivado</p>

    <div class="grid-campos">
        <div class="campo-box"><label>PACIENTE:</label><div id="val-paciente" class="resultado-texto">---</div></div>
        <div class="campo-box"><label>CÉDULA:</label><div id="val-cedula" class="resultado-texto">---</div></div>
        <div class="campo-box full-width"><label>INFORME MÉDICO:</label><div id="val-informe" class="resultado-texto">---</div></div>
        <div class="campo-box full-width"><label>RÉCIPE:</label><div id="val-recipe" class="resultado-texto">---</div></div>
        <div class="campo-box full-width"><label>INDICACIONES:</label><div id="val-indicaciones" class="resultado-texto">---</div></div>
        <div class="campo-box full-width"><label>ÓRDEN DE EXÁMENES:</label><div id="val-examenes" class="resultado-texto">---</div></div>
    </div>

    <div class="acciones">
        <button onclick="guardarYDescargar()" class="btn-main btn-pdf">
            <i class="fas fa-save"></i> GUARDAR Y GENERAR REPORTE PDF
        </button>
        <a id="lnk-whatsapp" href="#" class="btn-main btn-wa" target="_blank">
            <i class="fab fa-whatsapp"></i> ENVIAR REPORTE AL PACIENTE
        </a>
    </div>
</div>

<script>
    const btn = document.getElementById('btn-dictar');
    const status = document.getElementById('status');
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'es-ES';
    recognition.continuous = true;

    btn.onclick = () => {
        if(btn.classList.contains('grabando')) { recognition.stop(); } 
        else { recognition.start(); }
    };

    recognition.onstart = () => { btn.classList.add('grabando'); status.innerText = "ESCUCHANDO..."; };
    recognition.onend = () => { btn.classList.remove('grabando'); status.innerText = "MICRÓFONO DESACTIVADO"; };

    recognition.onresult = (event) => {
        const result = event.results[event.results.length - 1][0].transcript.toLowerCase();
        if(result.includes("nombre")) document.getElementById('val-paciente').innerText = result.replace("nombre", "").trim();
        if(result.includes("cédula")) document.getElementById('val-cedula').innerText = result.replace("cédula", "").trim();
        if(result.includes("informe")) document.getElementById('val-informe').innerText = result.replace("informe", "").trim();
        if(result.includes("récipe")) document.getElementById('val-recipe').innerText = result.replace("récipe", "").trim();
        if(result.includes("indicaciones")) document.getElementById('val-indicaciones').innerText = result.replace("indicaciones", "").trim();
        if(result.includes("exámenes")) document.getElementById('val-examenes').innerText = result.replace("exámenes", "").trim();
    };

    async function guardarYDescargar() {
        const datos = {
            paciente: document.getElementById('val-paciente').innerText,
            cedula: document.getElementById('val-cedula').innerText,
            informe: document.getElementById('val-informe').innerText,
            recipe: document.getElementById('val-recipe').innerText,
            indicaciones: document.getElementById('val-indicaciones').innerText,
            examenes: document.getElementById('val-examenes').innerText
        };

        try {
            const res = await fetch('/guardar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(datos)
            });

            if(res.ok) {
                alert("✅ Éxito: Guardado en Supabase.");
                generarPDF(datos);
                prepararWhatsApp(datos);
            } else {
                alert("❌ Error al guardar en el servidor.");
            }
        } catch(e) { alert("❌ Error de red: " + e); }
    }

    function generarPDF(d) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(20);
        doc.text("VOZ MÉDICA - REPORTE", 105, 20, { align: "center" });
        doc.setFontSize(12);
        doc.text(`Paciente: ${d.paciente} | Cédula: ${d.cedula}`, 20, 40);
        doc.text("INFORME:", 20, 60); doc.text(d.informe, 20, 70, { maxWidth: 170 });
        doc.text("RÉCIPE:", 20, 120); doc.text(d.recipe, 20, 130, { maxWidth: 170 });
        doc.addPage();
        doc.text("INDICACIONES:", 20, 20); doc.text(d.indicaciones, 20, 30, { maxWidth: 170 });
        if(d.examenes.length > 5) { doc.text("EXÁMENES:", 20, 100); doc.text(d.examenes, 20, 110, { maxWidth: 170 }); }
        doc.save(`Reporte_${d.paciente}.pdf`);
    }

    function prepararWhatsApp(d) {
        const msg = `*VOZ MÉDICA PRO*%0A*Paciente:* ${d.paciente}%0A*Informe:* ${d.informe}%0A*Récipe:* ${d.recipe}%0A*Indicaciones:* ${d.indicaciones}`;
        const btnWA = document.getElementById('lnk-whatsapp');
        btnWA.href = `https://wa.me/?text=${msg}`;
        btnWA.style.display = "flex";
    }
</script>
</body>
</html>
