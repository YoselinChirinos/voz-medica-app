<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Voz Médica - Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .mic-box { text-align: center; margin-bottom: 25px; }
        .btn-mic { background: #e74c3c; color: white; border: none; width: 70px; height: 70px; border-radius: 50%; font-size: 24px; cursor: pointer; }
        .btn-mic.active { background: #2ecc71; box-shadow: 0 0 15px #2ecc71; }
        
        /* Diseño idéntico a tu imagen */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: white; padding: 15px; border-radius: 8px; border: 1px solid #ddd; }
        .card label { font-weight: bold; color: #2c3e50; display: block; margin-bottom: 5px; font-size: 13px; }
        .content { min-height: 40px; color: #555; font-size: 15px; }
        .full { grid-column: span 2; }

        .btns { margin-top: 25px; display: flex; flex-direction: column; gap: 10px; }
        .btn-ready { padding: 18px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; text-align: center; text-decoration: none; }
        .save-pdf { background: #3498db; color: white; }
        .wa-btn { background: #25d366; color: white; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="mic-box">
        <button id="start-btn" class="btn-mic"><i class="fas fa-microphone"></i></button>
        <p id="status" style="color:#e74c3c; font-weight:bold;">MICRÓFONO DESACTIVADO</p>
    </div>

    <div class="grid">
        <div class="card"><label>NOMBRE:</label><div id="val-nombre" class="content">---</div></div>
        <div class="card"><label>CÉDULA:</label><div id="val-cedula" class="content">---</div></div>
        <div class="card full"><label>INFORME MÉDICO:</label><div id="val-informe" class="content">---</div></div>
        <div class="card full"><label>RÉCIPE:</label><div id="val-recipe" class="content">---</div></div>
        <div class="card full"><label>INDICACIONES:</label><div id="val-indicaciones" class="content">---</div></div>
        <div class="card full"><label>ORDEN DE EXÁMENES:</label><div id="val-examenes" class="content">---</div></div>
    </div>

    <div class="btns">
        <button onclick="procesarTodo()" class="btn-ready save-pdf">GUARDAR Y GENERAR PDF</button>
        <a id="link-wa" href="#" class="btn-ready wa-btn" target="_blank">ENVIAR POR WHATSAPP</a>
    </div>
</div>

<script>
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'es-ES';
    recognition.continuous = true;

    document.getElementById('start-btn').onclick = function() {
        if(this.classList.contains('active')) { recognition.stop(); } 
        else { recognition.start(); }
    };

    recognition.onstart = () => { 
        document.getElementById('start-btn').classList.add('active'); 
        document.getElementById('status').innerText = "ESCUCHANDO...";
    };

    recognition.onend = () => { 
        document.getElementById('start-btn').classList.remove('active'); 
        document.getElementById('status').innerText = "MICRÓFONO DESACTIVADO";
    };

    recognition.onresult = (event) => {
        const text = event.results[event.results.length - 1][0].transcript.toLowerCase();
        if(text.includes("nombre")) document.getElementById('val-nombre').innerText = text.split("nombre")[1].trim();
        if(text.includes("cédula")) document.getElementById('val-cedula').innerText = text.split("cédula")[1].trim();
        if(text.includes("informe")) document.getElementById('val-informe').innerText = text.split("informe")[1].trim();
        if(text.includes("récipe")) document.getElementById('val-recipe').innerText = text.split("récipe")[1].trim();
        if(text.includes("indicaciones")) document.getElementById('val-indicaciones').innerText = text.split("indicaciones")[1].trim();
        if(text.includes("exámenes")) document.getElementById('val-examenes').innerText = text.split("exámenes")[1].trim();
    };

    async function procesarTodo() {
        const datos = {
            paciente: document.getElementById('val-nombre').innerText,
            cedula: document.getElementById('val-cedula').innerText,
            informe: document.getElementById('val-informe').innerText,
            recipe: document.getElementById('val-recipe').innerText,
            indicaciones: document.getElementById('val-indicaciones').innerText,
            examenes: document.getElementById('val-examenes').innerText
        };

        const response = await fetch('/guardar', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(datos)
        });

        if(response.ok) {
            alert("Guardado exitoso");
            
            // Generar PDF
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("CONSULTA MÉDICA", 10, 10);
            doc.text(`Nombre: ${datos.paciente}`, 10, 20);
            doc.text(`Informe: ${datos.informe}`, 10, 30, {maxWidth: 180});
            doc.save("Reporte.pdf");

            // Mostrar WhatsApp
            const wa = document.getElementById('link-wa');
            wa.href = `https://wa.me/?text=*CONSULTA*%0A*Nombre:* ${datos.paciente}%0A*Informe:* ${datos.informe}`;
            wa.style.display = "block";
        }
    }
</script>
</body>
</html>
