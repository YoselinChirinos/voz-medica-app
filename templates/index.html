<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VozMédica Pro - Flujo Continuo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --blue: #0277bd; --green: #2e7d32; --red: #d32f2f; --gray: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gray); margin: 0; padding: 10px; }
        .app-container { max-width: 850px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--blue); padding-bottom: 10px; }
        .mic-section { text-align: center; padding: 15px; background: #e3f2fd; border-radius: 10px; margin: 15px 0; }
        .btn-mic { background: var(--red); color: white; border: none; width: 60px; height: 60px; border-radius: 50%; font-size: 24px; cursor: pointer; }
        .btn-mic.active { background: var(--green); box-shadow: 0 0 10px var(--green); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full { grid-column: span 2; }
        .field-header { display: flex; justify-content: space-between; align-items: center; }
        .btn-clear-small { font-size: 10px; color: var(--red); cursor: pointer; border: 1px solid var(--red); padding: 2px 5px; border-radius: 4px; }
        label { font-weight: bold; color: var(--blue); }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .actions { margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; min-width: 150px; }
        .btn-pdf { background: var(--blue); }
        .btn-wa { background: var(--green); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h2 style="margin:0; color:var(--blue);">🩺 VozMédica Pro</h2>
        <button class="btn-clear-small" onclick="limpiarPantalla()">Reiniciar Todo</button>
    </div>

    <div class="mic-section">
        <button id="mic-btn" class="btn-mic" onclick="toggleSpeech()">🎤</button>
        <p id="mic-status" style="margin:5px 0 0 0; font-size:14px;">Toque para dictar</p>
    </div>

    <div class="form-grid">
        <div><label>Nombre:</label><input type="text" id="nombre_paciente"></div>
        <div><label>Cédula:</label><input type="text" id="cedula"></div>
        <div class="full"><label>Teléfono Paciente:</label><input type="tel" id="telefono" value="+58" placeholder="Ej: +584120000000"></div>
        
        <div class="full">
            <div class="field-header"><label>Informe Médico:</label><span class="btn-clear-small" onclick="document.getElementById('informe').value=''">Borrar</span></div>
            <textarea id="informe"></textarea>
        </div>
        <div class="full">
            <div class="field-header"><label>Récipe:</label><span class="btn-clear-small" onclick="document.getElementById('recipe').value=''">Borrar</span></div>
            <textarea id="recipe"></textarea>
        </div>
        <div class="full">
            <div class="field-header"><label>Indicaciones:</label><span class="btn-clear-small" onclick="document.getElementById('indicaciones').value=''">Borrar</span></div>
            <textarea id="indicaciones"></textarea>
        </div>
        <div class="full">
            <div class="field-header"><label>Exámenes/Laboratorio:</label><span class="btn-clear-small" onclick="document.getElementById('examenes').value=''">Borrar</span></div>
            <textarea id="examenes"></textarea>
        </div>
    </div>

    <div class="actions">
        <button class="btn btn-pdf" onclick="visualizarPDF()">📄 VISUALIZAR PDF</button>
        <button class="btn btn-wa" onclick="enviarWhatsApp()">📲 ENVIAR POR WHATSAPP</button>
    </div>
</div>

<script>
    let recog;
    let recording = false;

    if ('webkitSpeechRecognition' in window) {
        recog = new webkitSpeechRecognition();
        recog.continuous = true;
        recog.interimResults = true;
        recog.lang = 'es-ES';

        recog.onresult = (event) => {
            let texto = event.results[event.results.length - 1][0].transcript.toLowerCase();
            if (event.results[event.results.length - 1].isFinal) {
                texto = texto.replace(/ punto/g, ".").replace(/ coma/g, ",").replace(/ y /g, ", ");
                distribuirCampos(texto);
            }
        };
    }

    function toggleSpeech() {
        const btn = document.getElementById('mic-btn');
        if (!recording) { recog.start(); recording = true; btn.classList.add('active'); }
        else { recog.stop(); recording = false; btn.classList.remove('active'); }
    }

    function distribuirCampos(t) {
        const limpiar = (str) => str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
        const textoOriginal = t.trim();
        const textoBusqueda = limpiar(textoOriginal);

        const triggers = [
            { k: "nombre", id: "nombre_paciente" },
            { k: "cedula", id: "cedula" },
            { k: "telefono", id: "telefono" },
            { k: "informe", id: "informe" },
            { k: "recipe", id: "recipe" },
            { k: "indicaciones", id: "indicaciones" },
            { k: "examenes", id: "examenes" },
            { k: "laboratorio", id: "examenes" }
        ];

        triggers.forEach(trig => {
            const claveLimpa = limpiar(trig.k);
            if (textoBusqueda.includes(claveLimpa)) {
                let indiceInicio = textoBusqueda.indexOf(claveLimpa) + claveLimpa.length;
                let valor = textoOriginal.substring(indiceInicio).trim();
                
                triggers.forEach(otro => {
                    const otraClave = limpiar(otro.k);
                    const valorLimpio = limpiar(valor);
                    if (valorLimpio.includes(otraClave)) {
                        let indiceCorte = valorLimpio.indexOf(otraClave);
                        valor = valor.substring(0, indiceCorte).trim();
                    }
                });

                if (valor.length > 0) {
                    const el = document.getElementById(trig.id);
                    let textoFinal = valor.charAt(0).toUpperCase() + valor.slice(1);
                    el.value = (el.value ? el.value + " " : "") + textoFinal;
                }
            }
        });
    }

    function visualizarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const fecha = new Date().toLocaleDateString();
        const nom = document.getElementById('nombre_paciente').value || "Paciente";

        const secs = [
            { t: "INFORME MÉDICO", c: document.getElementById('informe').value },
            { t: "RÉCIPE", c: document.getElementById('recipe').value },
            { t: "INDICACIONES", c: document.getElementById('indicaciones').value },
            { t: "ORDEN DE EXÁMENES", c: document.getElementById('examenes').value }
        ];

        secs.forEach((s, i) => {
            if (i > 0) doc.addPage();
            doc.setFontSize(14); doc.text(s.t, 105, 20, { align: 'center' });
            doc.setFontSize(10); doc.text(`Fecha: ${fecha} | Paciente: ${nom}`, 20, 30);
            doc.line(20, 32, 190, 32);
            doc.text(doc.splitTextToSize(s.c, 170), 20, 45);
        });

        const string = doc.output('bloburl');
        window.open(string, '_blank');

        setTimeout(() => {
            if (confirm("¿Desea limpiar la pantalla para el siguiente paciente?")) {
                limpiarPantalla();
            }
        }, 2000);
    }

    function enviarWhatsApp() {
        let tel = document.getElementById('telefono').value.trim();
        tel = tel.replace(/\s+/g, '').replace(/-/g, '');

        if (!tel || tel === "+58") return alert("Por favor, ingrese un número de teléfono válido.");
        
        const msg = encodeURIComponent("Hola, le envío los documentos de su consulta médica.");
        window.open(`https://api.whatsapp.com/send?phone=${tel}&text=${msg}`, '_blank');

        setTimeout(() => {
            if (confirm("¿Se abrió el chat? ¿Desea limpiar la pantalla ahora?")) {
                limpiarPantalla();
            }
        }, 2000);
    }

    function limpiarPantalla() {
        const inputs = document.querySelectorAll('input, textarea');
        inputs.forEach(i => i.value = '');
    }
</script>
</body>
</html>
