<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>VozMédica Pro - Control Total</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #0277bd; --secondary: #2e7d32; --danger: #c62828; --bg: #f0f4f8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        /* Estilos del Formulario */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .full { grid-column: span 2; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        
        /* Botonera de flujo */
        .action-bar { display: flex; gap: 10px; margin-top: 25px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; transition: 0.3s; }
        .btn-save { background: var(--primary); }
        .btn-pdf { background: #607d8b; display: none; } /* Se activa tras guardar */
        .btn-wa { background: var(--secondary); display: none; } /* Se activa tras PDF */
        .btn-clear { background: #757575; }

        .preview-pane { 
            display: none; 
            margin-top: 20px; 
            padding: 20px; 
            background: #fff9c4; 
            border: 2px solid #fbc02d; 
            border-radius: 10px; 
        }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: var(--primary); text-align: center;">🩺 Consola Médica</h2>
    
    <!-- Campos del Formulario -->
    <div class="grid">
        <div><label>Paciente:</label><input type="text" id="pac_nom"></div>
        <div><label>Cédula:</label><input type="text" id="pac_ced"></div>
        <div><label>WhatsApp:</label><input type="text" id="pac_tel"></div>
        <div class="full"><label>Indicaciones:</label><textarea id="indicaciones"></textarea></div>
        <div class="full"><label>Récipe:</label><textarea id="recipe"></textarea></div>
    </div>

    <!-- Panel de Previsualización -->
    <div id="preview" class="preview-pane">
        <h3>🔍 Revisión del Documento</h3>
        <div id="preview-content"></div>
        <p style="font-size: 12px; color: #555;">Si todo es correcto, descargue el PDF y envíe por WhatsApp.</p>
    </div>

    <!-- Botonera Dinámica -->
    <div class="action-bar">
        <button class="btn btn-clear" onclick="location.reload()">🔄 NUEVO</button>
        <button id="btn-save" class="btn btn-save" onclick="guardarEnNube()">1. GUARDAR EN NUBE</button>
        <button id="btn-pdf" class="btn btn-pdf" onclick="generarYRevisarPDF()">2. VER/DESCARGAR PDF</button>
        <button id="btn-wa" class="btn btn-wa" onclick="enviarWhatsApp()">3. ENVIAR A WHATSAPP</button>
    </div>
</div>

<script>
    // 1. GUARDAR EN NUBE (Soluciona el error 401)
    async function guardarEnNube() {
        const btn = document.getElementById('btn-save');
        const datos = {
            nombre: document.getElementById('pac_nom').value,
            cedula: document.getElementById('pac_ced').value,
            indicaciones: document.getElementById('indicaciones').value,
            recipe: document.getElementById('recipe').value
        };

        if(!datos.nombre) return alert("Falta el nombre");

        try {
            const res = await fetch('/guardar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datos)
            });

            if(res.ok) {
                alert("✅ Guardado en base de datos.");
                btn.style.background = "#4caf50";
                btn.innerText = "✓ GUARDADO";
                document.getElementById('btn-pdf').style.display = "block";
            } else {
                const err = await res.json();
                alert("❌ ERROR DE LLAVE: " + err.message);
            }
        } catch(e) { alert("Error de conexión"); }
    }

    // 2. GENERAR PDF Y MOSTRAR PREVIA
    function generarYRevisarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        const nom = document.getElementById('pac_nom').value;
        const ind = document.getElementById('indicaciones').value;

        // Configuración estética del PDF
        doc.setFontSize(18);
        doc.text("CONSULTA MÉDICA", 105, 20, { align: 'center' });
        doc.setFontSize(12);
        doc.text(`Paciente: ${nom}`, 20, 40);
        doc.text("Indicaciones:", 20, 60);
        doc.text(doc.splitTextToSize(ind, 170), 20, 70);

        // Mostrar previsualización en pantalla
        document.getElementById('preview').style.display = "block";
        document.getElementById('preview-content').innerHTML = `
            <b>Paciente:</b> ${nom}<br>
            <b>Indicaciones:</b> ${ind.substring(0, 100)}...
        `;

        // Descarga el PDF automáticamente
        doc.save(`Consulta_${nom}.pdf`);
        
        // Habilita el paso final
        document.getElementById('btn-wa').style.display = "block";
    }

    // 3. ENVIAR WHATSAPP (Solo tras revisión)
    function enviarWhatsApp() {
        const tel = document.getElementById('pac_tel').value;
        const nom = document.getElementById('pac_nom').value;
        const ind = document.getElementById('indicaciones').value;

        if(!tel) return alert("Debe ingresar un número de WhatsApp");

        const msj = `*HOLA ${nom.toUpperCase()}*\nAdjunto envío su informe médico.\n\n*INDICACIONES:*\n${ind}`;
        const url = `https://wa.me/${tel.replace(/\D/g, '')}?text=${encodeURIComponent(msj)}`;
        
        window.open(url, '_blank');
    }
</script>
</body>
</html>
