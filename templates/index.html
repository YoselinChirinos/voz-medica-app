<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VozMédica Pro - Consola de Dictado</title>
    <!-- Librerías para PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root { --primary: #0277bd; --secondary: #2e7d32; --danger: #c62828; --bg: #f0f4f8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); text-align: center; }
        
        /* Sección Micrófono */
        .mic-box { text-align: center; padding: 20px; border: 2px dashed #ccc; border-radius: 15px; margin-bottom: 20px; background: #fafafa; }
        .btn-mic { background: var(--danger); color: white; border: none; border-radius: 50%; width: 70px; height: 70px; font-size: 30px; cursor: pointer; transition: 0.3s; }
        .btn-mic.recording { background: var(--secondary); animation: pulse 1.5s infinite; }
        
        /* Formulario */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full { grid-column: span 2; }
        label { font-weight: bold; display: block; margin-bottom: 5px; color: var(--primary); }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        textarea { height: 80px; }

        .btn-final { background: var(--secondary); color: white; border: none; padding: 15px 30px; border-radius: 10px; width: 100%; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn-final:disabled { background: #ccc; }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(46, 125, 50, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(46, 125, 50, 0); } 100% { box-shadow: 0 0 0 0 rgba(46, 125, 50, 0); } }
    </style>
</head>
<body>

<div class="container">
    <h1>🩺 VozMédica Pro</h1>
    
    <div class="mic-box">
        <button id="btn-mic" class="btn-mic" onclick="toggleMic()">🎤</button>
        <p id="status">Presiona para dictar</p>
        <p id="interino" style="font-style: italic; color: #666;"></p>
    </div>

    <div class="grid">
        <div><label>Nombre Paciente:</label><input type="text" id="pac_nom"></div>
        <div><label>Cédula:</label><input type="text" id="pac_ced"></div>
        <div><label>WhatsApp:</label><input type="text" id="pac_tel" placeholder="+58414..."></div>
        <div><label>Próxima Cita:</label><input type="text" id="regresar"></div>
        
        <div class="full"><label>Informe Clínico:</label><textarea id="informe"></textarea></div>
        <div class="full"><label>Récipe:</label><textarea id="recipe"></textarea></div>
        <div class="full"><label>Indicaciones:</label><textarea id="indicaciones"></textarea></div>
        <div class="full"><label>Exámenes:</label><textarea id="examenes"></textarea></div>
    </div>

    <button id="btn-main" class="btn-final" onclick="flujoCompleto()">🚀 GUARDAR, PDF Y WHATSAPP</button>
</div>

<script>
    let recognition;
    let isRecording = false;

    // Configuración de Reconocimiento de Voz
    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'es-ES';

        recognition.onresult = (event) => {
            let texto = "";
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    procesarComando(event.results[i][0].transcript.toLowerCase());
                } else {
                    texto += event.results[i][0].transcript;
                }
            }
            document.getElementById('interino').innerText = texto;
        };
    }

    function toggleMic() {
        const btn = document.getElementById('btn-mic');
        if (!isRecording) {
            recognition.start();
            btn.classList.add('recording');
            document.getElementById('status').innerText = "Escuchando...";
            isRecording = true;
        } else {
            recognition.stop();
            btn.classList.remove('recording');
            document.getElementById('status').innerText = "Presiona para dictar";
            isRecording = false;
        }
    }

    function procesarComando(t) {
        const mapeo = {
            "nombre": "pac_nom", "cédula": "pac_ced", "cedula": "pac_ced",
            "whatsapp": "pac_tel", "informe": "informe", "récipe": "recipe", 
            "recipe": "recipe", "indicaciones": "indicaciones", "exámenes": "examenes",
            "examenes": "examenes", "cita": "regresar"
        };
        
        for (const [clave, id] of Object.entries(mapeo)) {
            if (t.includes(clave)) {
                let valor = t.split(clave)[1].trim();
                if (valor) {
                    const campo = document.getElementById(id);
                    if (id === "pac_tel") valor = valor.replace(/\s/g, '');
                    campo.value = valor.charAt(0).toUpperCase() + valor.slice(1);
                }
            }
        }
    }

    // FLUJO PRINCIPAL
    async function flujoCompleto() {
        const btn = document.getElementById('btn-main');
        const datos = {
            nombre: document.getElementById('pac_nom').value,
            cedula: document.getElementById('pac_ced').value,
            telefono: document.getElementById('pac_tel').value,
            informe: document.getElementById('informe').value,
            recipe: document.getElementById('recipe').value,
            indicaciones: document.getElementById('indicaciones').value,
            examenes: document.getElementById('examenes').value,
            cita: document.getElementById('regresar').value
        };

        if (!datos.nombre) return alert("Por favor, ingrese el nombre del paciente.");

        btn.disabled = true;
        btn.innerText = "⌛ PROCESANDO...";

        try {
            // 1. Guardar en Supabase a través de tu app.py
            const response = await fetch('/guardar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datos)
            });

            if (response.ok) {
                // 2. Generar PDF
                generarPDF(datos);
                // 3. Enviar WhatsApp
                enviarWA(datos);
                alert("✅ Éxito: Guardado, PDF generado y WhatsApp abierto.");
            } else {
                alert("❌ Error al guardar en la base de datos.");
            }
        } catch (error) {
            alert("❌ Error de conexión con el servidor.");
        } finally {
            btn.disabled = false;
            btn.innerText = "🚀 GUARDAR, PDF Y WHATSAPP";
        }
    }

    function generarPDF(d) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        doc.setFontSize(20);
        doc.setTextColor(2, 119, 189);
        doc.text("VOZMÉDICA PRO - INFORME", 105, 20, { align: 'center' });
        
        doc.setFontSize(12);
        doc.setTextColor(0);
        doc.text(`Paciente: ${d.nombre}`, 20, 40);
        doc.text(`Cédula: ${d.cedula}`, 20, 50);
        doc.text(`Fecha: ${new Date().toLocaleDateString()}`, 20, 60);
        
        doc.line(20, 65, 190, 65);
        doc.text("INDICACIONES Y TRATAMIENTO:", 20, 80);
        doc.setFontSize(10);
        const lineas = doc.splitTextToSize(d.indicaciones || "Sin indicaciones adicionales.", 170);
        doc.text(lineas, 20, 90);
        
        doc.save(`Consulta_${d.nombre}.pdf`);
    }

    function enviarWA(d) {
        if (!d.telefono) return;
        const mensaje = `*VOZMÉDICA PRO*\n\nHola *${d.nombre}*, aquí tienes tus indicaciones:\n\n${d.indicaciones}\n\n*Próxima cita:* ${d.cita}`;
        const url = `https://wa.me/${d.telefono.replace('+', '')}?text=${encodeURIComponent(mensaje)}`;
        window.open(url, '_blank');
    }
</script>
</body>
</html>
