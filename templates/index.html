<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>VozMédica Pro - Sistema Directo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #0277bd; --secondary: #2e7d32; --danger: #c62828; --bg: #f0f4f8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); margin-bottom: 20px; padding-bottom: 10px; }
        .mic-box { text-align: center; margin-bottom: 20px; border: 2px dashed var(--primary); padding: 15px; border-radius: 10px; }
        .btn-mic { background: var(--danger); color: white; border: none; width: 60px; height: 60px; border-radius: 50%; font-size: 24px; cursor: pointer; }
        .btn-mic.recording { background: var(--secondary); animation: pulse 1.5s infinite; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full { grid-column: span 2; }
        label { font-weight: bold; color: var(--primary); display: block; margin-top: 10px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        textarea { height: 100px; }
        .action-bar { display: flex; gap: 10px; margin-top: 25px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; }
        .btn-save { background: var(--primary); }
        .btn-wa { background: var(--secondary); display: none; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(46, 125, 50, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(46, 125, 50, 0); } 100% { box-shadow: 0 0 0 0 rgba(46, 125, 50, 0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0; color: var(--primary);">🩺 VozMédica Pro</h2>
        <a href="/logout" style="text-decoration:none; color:grey; font-size:12px;">Cerrar Sesión</a>
    </div>

    <div class="mic-box">
        <button id="btn-mic" class="btn-mic" onclick="toggleMic()">🎤</button>
        <p id="status">Diga: "Nombre...", "Cédula...", "Informe..."</p>
    </div>

    <div class="grid">
        <div><label>Nombre del Paciente:</label><input type="text" id="pac_nom"></div>
        <div><label>Cédula:</label><input type="text" id="pac_ced"></div>
        <div class="full"><label>Informe Clínico:</label><textarea id="informe"></textarea></div>
        <div class="full"><label>Récipe:</label><textarea id="recipe"></textarea></div>
        <div class="full"><label>Indicaciones:</label><textarea id="indicaciones"></textarea></div>
        <div class="full"><label>Exámenes:</label><textarea id="examenes"></textarea></div>
    </div>

    <div class="action-bar">
        <button class="btn btn-save" onclick="guardarDirecto()">🚀 GUARDAR Y GENERAR PDF</button>
        <button id="btn-wa" class="btn btn-wa" onclick="enviarWA()">📲 ENVIAR WHATSAPP</button>
    </div>
</div>

<script>
    let recognition;
    let isRecording = false;

    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'es-ES';

        recognition.onresult = (event) => {
            let texto = event.results[event.results.length - 1][0].transcript.toLowerCase();
            if (event.results[event.results.length - 1].isFinal) procesarTexto(texto);
        };
    }

    function toggleMic() {
        if (!isRecording) { recognition.start(); isRecording = true; document.getElementById('btn-mic').classList.add('recording'); }
        else { recognition.stop(); isRecording = false; document.getElementById('btn-mic').classList.remove('recording'); }
    }

    function procesarTexto(t) {
        const campos = [
            { k: "nombre", id: "pac_nom" }, { k: "cédula", id: "pac_ced" }, { k: "cedula", id: "pac_ced" },
            { k: "informe", id: "informe" }, { k: "récipe", id: "recipe" }, { k: "recipe", id: "recipe" },
            { k: "indicaciones", id: "indicaciones" }, { k: "exámenes", id: "examenes" }, { k: "examenes", id: "examenes" }
        ];
        campos.forEach(c => {
            if (t.includes(c.k)) {
                let val = t.split(c.k)[1].trim();
                campos.forEach(o => { if (val.includes(o.k)) val = val.split(o.k)[0].trim(); });
                document.getElementById(c.id).value = val.charAt(0).toUpperCase() + val.slice(1);
            }
        });
    }

    async function guardarDirecto() {
        const d = {
            nombre_paciente: document.getElementById('pac_nom').value,
            cedula: document.getElementById('pac_ced').value,
            informe: document.getElementById('informe').value,
            recipe: document.getElementById('recipe').value,
            indicaciones: document.getElementById('indicaciones').value,
            examenes: document.getElementById('examenes').value
        };

        if(!d.nombre_paciente) return alert("Falta el nombre");

        try {
            // CONEXIÓN DIRECTA A LA API DE SUPABASE
            const res = await fetch("https://gzlccjdaxdxrrbaqemgo.supabase.co/rest/v1/consultas", {
                method: "POST",
                headers: {
                    "apikey": "sb_publishable_Qtzr0MnVTUuMa2_1KoEpFg_bomVqHXI",
                    "Authorization": "Bearer sb_publishable_Qtzr0MnVTUuMa2_1KoEpFg_bomVqHXI",
                    "Content-Type": "application/json",
                    "Prefer": "return=minimal"
                },
                body: JSON.stringify(d)
            });

            if (res.ok) {
                generarPDF(d);
                document.getElementById('btn-wa').style.display = "block";
                alert("✅ Guardado exitoso.");
            } else {
                alert("❌ Error en base de datos. Verifique RLS en Supabase.");
            }
        } catch (e) { alert("Error de conexión: " + e.message); }
    }

    function generarPDF(d) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("CONSULTA MÉDICA", 105, 20, { align: 'center' });
        doc.text(`Paciente: ${d.nombre_paciente}`, 20, 40);
        doc.text(`Cédula: ${d.cedula}`, 20, 50);
        doc.text(`Informe: ${d.informe}`, 20, 70);
        // Espacio para sello
        doc.rect(130, 240, 50, 30);
        doc.text("Firma y Sello", 155, 275, { align: 'center' });
        doc.save(`Consulta_${d.nombre_paciente}.pdf`);
    }

    function enviarWA() {
        const link = `https://wa.me/?text=Hola, envío su consulta médica.`;
        window.open(link, '_blank');
    }
</script>
</body>
</html>
